[package]
name = "fusionauth_jwt_rs"
version = "0.1.0"
edition = "2024"
description = "WASI-compatible FusionAuth JWT verification (JWKS / RS256) for wasmCloud components"
license = "MIT"
repository = "https://github.com/bettyblocks/fusionauth_jwt_rs"
keywords = ["jwt", "fusionauth", "wasi", "wasmcloud", "jwks"]
categories = ["authentication", "wasm"]

[lib]
crate-type = ["rlib"]

[dependencies]
base64 = "0.22"
rsa = "0.9"
sha2 = { version = "0.10", features = ["oid"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# wasi:http and wasi:clocks bindings are only used when targeting wasm.
# On the host (e.g. `cargo test`) the pure verification path is used instead.
[target.'cfg(target_arch = "wasm32")'.dependencies]
wasi = "0.14"

[dev-dependencies]
# `pem` is only needed by the test harness to load the sample RSA key and sign
# tokens. Feature unification keeps it out of `cargo build` (release) graphs.
rsa = { version = "0.9", features = ["pem"] }
