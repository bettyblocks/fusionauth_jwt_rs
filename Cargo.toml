[package]
name = "fusionauth_jwt_rs"
version = "0.1.0"
edition = "2024"
description = "WASI-compatible FusionAuth JWT verification (JWKS / RS256) for wasmCloud components"
license = "MIT"
repository = "https://github.com/bettyblocks/fusionauth_jwt_rs"
keywords = ["jwt", "fusionauth", "wasi", "wasmcloud", "jwks"]
categories = ["authentication", "wasm"]

[lib]
crate-type = ["rlib"]

[dependencies]
base64 = "0.22"
# RS256/384/512 verification + claim validation. `pure-rust` forces the
# RustCrypto backend (no `boring`/BoringSSL/cmake) on every target, so the host
# build and the `wasm32-wasip2` component share the same pure-Rust crypto.
jwt-simple = { version = "0.12", default-features = false, features = ["pure-rust"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# wasi:http and wasi:clocks bindings are only used when targeting wasm.
# On the host (e.g. `cargo test`) the pure verification path is used instead.
[target.'cfg(target_arch = "wasm32")'.dependencies]
wasi = "0.14"

[dev-dependencies]
# The test harness signs sample tokens itself, so it needs raw RSA + SHA-2.
# These are test-only; the library proper verifies via `jwt-simple`.
rsa = { version = "0.9", features = ["pem"] }
sha2 = { version = "0.10", features = ["oid"] }
